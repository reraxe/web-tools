<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173f35">
  <title>Dex</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css?v=v1.1b-test">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="brand" href="#inventory" aria-label="Dex inventory">
        <span class="brand-mark">D</span>
        <span><strong>Dex</strong><small>TCG inventory</small></span>
      </a>
      <nav id="primary-nav">
        <button class="nav-item active" data-view="inventory"><i data-lucide="library-big"></i><span>Inventory</span></button>
        <button class="nav-item" data-view="inbound"><i data-lucide="scan-line"></i><span>Inbound</span><b id="nav-review-count">0</b></button>
        <button class="nav-item" data-view="labels"><i data-lucide="qr-code"></i><span>Labels</span><b id="nav-label-count">0</b></button>
        <button class="nav-item" data-view="outbound"><i data-lucide="package-check"></i><span>Outbound</span></button>
        <button class="nav-item" data-view="sales"><i data-lucide="receipt-text"></i><span>Sales</span></button>
        <button class="nav-item recycle-nav" data-view="recycle"><i data-lucide="trash-2"></i><span>Recycle Bin</span><b id="nav-recycle-count">0</b></button>
      </nav>
      <div class="capacity-panel">
        <div><span>TCGplayer capacity</span><strong id="capacity-label">0 / 500</strong></div>
        <div class="capacity-track"><span id="capacity-bar"></span></div>
        <small id="capacity-note">500 slots available</small>
      </div>
      <div class="server-state"><span></span>Home Network · v1.1b-test</div>
    </aside>

    <div class="workspace">
      <header class="topbar">
        <button class="icon-button mobile-menu" id="mobile-menu" title="Open navigation"><i data-lucide="menu"></i></button>
        <div class="page-identity"><h1 id="page-title">Inventory</h1><p id="page-subtitle">Every physical card, accounted for.</p></div>
        <div class="top-actions">
          <button class="button secondary" id="quick-outbound"><i data-lucide="scan-qr-code"></i><span>Scan outbound</span></button>
          <button class="button primary" id="quick-batch"><i data-lucide="plus"></i><span>New batch</span></button>
        </div>
      </header>
      <main id="app" tabindex="-1"></main>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <dialog id="modal">
    <div class="modal-header">
      <div><h2 id="modal-title"></h2><p id="modal-subtitle"></p></div>
      <button class="icon-button" id="modal-close" title="Close"><i data-lucide="x"></i></button>
    </div>
    <div id="modal-body"></div>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="/vendor/lucide.min.js?v=v1.1b-test"></script>
  <script src="/app.js?v=v1.1b-test"></script>
</body>
</html>
