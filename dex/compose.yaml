services:
  dex:
    build: .
    image: "${DEX_IMAGE:-dex:latest}"
    container_name: dex
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8080:8080"
    environment:
      DEX_DATA_DIR: /data
      DEX_INBOUND_DIR: /scanner-inbox
      DEX_WATCH_INBOUND: "1"
      DEX_SCAN_INTERVAL: "5"
      DEX_SEED_DEMO: "0"
    volumes:
      - ./storage:/data
      - ./scanner-inbox:/scanner-inbox
